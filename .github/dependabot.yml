version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      patches:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 3

  - package-ecosystem: nix
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: nixpkgs
